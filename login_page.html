<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="ninka_temp.css">
    <title>Login page</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <!-- <a> = odkaz. href = adresa kam vedie -->
    <a href="sablona_ba.html" class="logo">LEXEM</a>

    <!-- <nav> = navigačná časť stránky -->
    <nav class="header-nav">
        <!-- <button> = interaktívne tlačidlo -->
        <a href="signup_page.html" class="btn-create">CREATE AN ACCOUNT</a>

    </nav>

</header>
<main>
    <div class="login-box">
        <h2>LOGIN IN</h2>

        <div class="email">
            <label>email</label>
            <div class="input-icon1">
                <input type="email" placeholder="">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>

        <div class="password">
            <label>password</label>
            <div class="input-icon2">
                <input type="password" placeholder="">
                <i class="fa-regular fa-eye"></i>
            </div>
        </div>
        <button class="btn-login" onclick="window.location.href='sablona_ba.html'">LOGIN IN</button>
    </div>
</main>
</body>
</html>
