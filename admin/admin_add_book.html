<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Add Book</title>



  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<header>
  <a href="admin_homepage.html" class="logo">LEXEM</a>
  <nav class="header-nav">
    <a href="admin_account.html" class="btn-login">ACCOUNT</a>
    <a href="../homepage.html" class="btn-login">LOG OUT</a>
  </nav>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>
<nav class="mobile-nav" id="mobileNav">
  <a href="admin_account.html">Account</a>
  <a href="../homepage.html">LOG OUT</a>
</nav>

<main>
  <div class="book-detail">
    <div class="book-detail-cover">
      <div class="field-group">
        <label class="field-label">Photo 1</label>
        <input type="file" accept="image/*">
      </div>
      <div class="field-group">
        <label class="field-label">Photo 2</label>
        <input type="file" accept="image/*">
      </div>
    </div>


    <div class="book-detail-info">
      <div>
        <input type="text" class="book-detail-title-write" placeholder="Title" >
      </div>
      <div>
        <input type="text" class="book-detail-author-write" placeholder="Author">
      </div>
      <div class="description-wrapper">
        <label class="field-label">Description</label>
        <textarea class="big-field-input" rows="10" placeholder="Add book description" >

                </textarea>
      </div>
    </div>
    <div class="book-detail-extras">
      <div>
        <input type="text" class="book-detail-price" placeholder="price in €" >
      </div>
      <div>
        <input type="text" class="book-detail-language" placeholder="Language">
      </div>
      <div class="book-detail-add"> <a >REMOVE </a></div>
    </div>
    <div class="rating">
      <p class="rating-label">RATING</p>
      <div class="stars">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
      </div>
    </div>
    <div class="book-detail-save"> <a >SAVE </a></div>

  </div>
</main>


<footer>
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="/" class="logo">LEXEM</a>
      <p class="footer-tagline">Not just selling books, we are creating our own fantasy.</p>
      <a href="https://www.instagram.com/_nina.anin_/" class="footer-social">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="3"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
        </svg>
      </a>
      <a href="https://www.instagram.com/alexandra_aghova/" class="footer-social">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="3"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
        </svg>
      </a>
    </div>

    <div class="footer-col">
      <h4>Categories</h4>
      <ul>
        <li><a href="admin_book_pages.html">Books</a></li>
        <li><a href="admin_book_pages.html">Sale</a></li>
        <li><a href="admin_book_pages.html">New releases</a></li>

      </ul>
    </div>


    <div class="footer-col">
      <h4>Contact information</h4>
      <ul>
        <li>Bratislava, Dúhová 17</li>
        <li>support@lexem.sk</li>
        <li>+42112345678</li>
      </ul>
    </div>

  </div>
</footer>
<script>
  const stars = document.querySelectorAll('.star');
  stars.forEach(star => {
    star.addEventListener('click', () => {
      const val = +star.dataset.value;
      stars.forEach(s => s.classList.toggle('active', +s.dataset.value <= val));
    });
  });

  const btn = document.getElementById('btnShowMore');
  const wrapper = document.querySelector('.description-wrapper');

  btn.addEventListener('click', () => {
    wrapper.classList.toggle('expanded');
    btn.textContent = wrapper.classList.contains('expanded') ? 'Show less' : 'Show more';
  });

  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobileNav');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileNav.classList.toggle('open');
  });
</script>
</body>
</html>
