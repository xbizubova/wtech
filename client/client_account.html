<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Client Account</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>



<body>

<header>
    <a href="client_homepage.html" class="logo">LEXEM</a>
    <nav class="header-nav">
        <a href="../homepage.html" class="btn-login">LOG OUT</a>
        <a href="client_basket.html" class="btn-cart">
            <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
        </a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</header>
<nav class="mobile-nav" id="mobileNav">
    <a href="../homepage.html">LOG OUT</a>
    <a href="client_basket.html">Basket</a>

</nav>

    <main>
        <div class="account-container">
            <h1 class="account-title">ACCOUNT INFORMATION</h1>
            <div class="account-form">
                <div class="form-grid">

                    <!-- Left column -->
                    <div class="form-col">
                        <div class="field-group">
                            <label class="field-label">Email</label>
                            <input type="email" class="field-input" placeholder="" value="novakova.jana@stuba.sk">
                        </div>
                        <div class="field-group">
                            <label class="field-label">First name</label>
                            <input type="text" class="field-input" placeholder="" value="Jana">
                        </div>
                        <div class="field-group">
                            <label class="field-label">Surname</label>
                            <input type="text" class="field-input" placeholder="" value="Nováková">
                        </div>
                        <div class="field-group">
                            <label class="field-label">Phone number</label>
                            <input type="tel" class="field-input" placeholder="" value="+421903456789">
                        </div>
                    </div>

                    <!-- Right column -->
                    <div class="form-col">
                        <div class="field-group">
                            <label class="field-label">Street and house number</label>
                            <input type="text" class="field-input" placeholder="" value="Hlavná 12">
                        </div>
                        <div class="field-group">
                            <label class="field-label">City</label>
                            <input type="text" class="field-input" placeholder="" value="Bratislava">
                        </div>
                        <div class="field-group">
                            <label class="field-label">State</label>
                            <input type="text" class="field-input" placeholder="" value="Slovakia">
                        </div>
                        <div class="field-group">
                            <button class="field-group-btn">CHANGE INFORMATION</button>
                        </div>
                    </div>

                </div>
            </div>
            <div class="book-history">
                <h1 class="history">BOOKS YOU PURCHASED</h1>
                <div class="order-history">
                    <div class="books-grid-4">
                        <a href="client_detail_book_page.html" class="book-card">
                            <img class="book-cover" src="../pictures/six_of_crows.JPG" alt="Six of crows">
                            <p class="book-title">Six of Crows</p>
                        </a>
                        <a href="client_detail_book_page.html" class="book-card">
                            <img class="book-cover" src="../pictures/mate.JPG" alt="Mate">
                            <p class="book-title">Mate</p>
                        </a>
                        <a href="client_detail_book_page.html" class="book-card">
                            <img class="book-cover" src="../pictures/pacient.JPG" alt="Pacient">
                            <p class="book-title">Pacient</p>
                        </a>
                        <a href="client_detail_book_page.html" class="book-card">
                            <img class="book-cover" src="../pictures/girl_in_pieces.JPG" alt="Girl in pieces">
                            <p class="book-title">Girl in pieces</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileNav.classList.toggle('open');
    });
</script>
</body>

</html>
