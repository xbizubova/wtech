<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Customer Information</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">

<body>

<header>
    <a href="client_homepage.html" class="logo">LEXEM</a>
    <nav class="header-nav">
        <a href="client_account.html" class="btn-login">ACCOUNT</a>

    </nav>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</header>
<nav class="mobile-nav" id="mobileNav">
    <a href="client_account.html">Account</a>
    <a href="client_homepage.html">Home</a>

</nav>

<main>
    <div class="shipping-container">

        <h1 class="shipping-title">Customer Information</h1>

        <div class="shipping-form">
            <div class="form-grid">

                <!-- Left column -->
                <div class="form-col">
                    <div class="field-group">
                        <label class="field-label">Email</label>
                        <input type="email" class="field-input" placeholder="" value="novakova.jana@stuba.sk">
                    </div>
                    <div class="field-group">
                        <label class="field-label">First name</label>
                        <input type="text" class="field-input" placeholder="" value="Jana">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Surname</label>
                        <input type="text" class="field-input" placeholder="" value="Nováková">
                    </div>
                    <div class="field-group">
                        <label class="field-label">Phone number</label>
                        <input type="tel" class="field-input" placeholder="" value="+421903456789">
                    </div>
                </div>

                <!-- Right column -->
                <div class="form-col">
                    <div class="field-group">
                        <label class="field-label">Street and house number</label>
                        <input type="text" class="field-input" placeholder="" value="Hlavná 12">
                    </div>
                    <div class="field-group">
                        <label class="field-label">City</label>
                        <input type="text" class="field-input" placeholder="" value="Bratislava">
                    </div>
                    <div class="field-group">
                        <label class="field-label">State</label>
                        <input type="text" class="field-input" placeholder="" value="Slovakia">
                    </div>
                    <div class="form-checkboxes">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">The Billing Address Is Different From The Delivery Address.</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">I Invoice The Company.</span>
                        </label>
                    </div>
                </div>

            </div>
        </div>

    </div><!-- /.shipping-container -->

    <div class="step-wrapper">
        <a href="client_shipping_method.html" class="btn-step" id="stepBtn">
            Shipping Method
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </a>
    </div>

</main>

        <div class="footer-brand">
            <a href="/" class="logo">LEXEM</a>
            <p class="footer-tagline">Not just selling books, we are creating our own fantasy.</p>
            <a href="https://www.instagram.com/_nina.anin_/" class="footer-social">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="3"/>
                    <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
                </svg>
            </a>
            <a href="https://www.instagram.com/alexandra_aghova/" class="footer-social">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="3"/>
                    <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
                </svg>
            </a>
        </div>

        <div class="footer-col">
            <h4>Categories</h4>
            <ul>
                <li><a href="client_bookpages.html">Books</a></li>
                <li><a href="client_bookpages.html">Sale</a></li>

            </ul>

        <div class="footer-col">
            <h4>Contact information</h4>
            <ul>
                <li>Bratislava, Dúhová 17</li>
                <li>support@lexem.sk</li>
                <li>+42112345678</li>
            </ul>
        </div>

    </div>
</footer>

<script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileNav.classList.toggle('open');
    });
</script>
