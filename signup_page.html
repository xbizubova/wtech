<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body>

<header>
    <a href="homepage.html" class="logo">LEXEM</a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
    </button>
</header>
<nav class="mobile-nav" id="mobileNav">
    <a href="login_page.html">Login In</a>
    <a href="homepage.html">Home</a>
</nav>

<main>
    <div class="login-box">
        <h2>SIGN UP</h2>
        <div class="email">
            <label>email</label>
            <div class="input-icon1">
                <input type="email" placeholder="">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>
        <div class="email">
            <label>First name</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <div class="email">
            <label>Last name</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <div class="email">
            <label>Create a password</label>
            <div class="input-icon1">
                <input type="password">
            </div>
        </div>
        <div class="email">
            <label>Repeat password</label>
            <div class="input-icon1">
                <input type="password">
            </div>
        </div>
        <button class="btn-login" onclick="window.location.href='homepage.html'">REGISTER ME!</button>
    </div>
</main>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobileNav');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileNav.classList.toggle('open');
    });
</script>
</body>
</html>
