<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="ninka_temp.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body>

<header>
    <a href="/" class="logo">LEXEM</a>

</header>

<main>
    <div class="login-box">
        <h2>SIGN UP</h2>
        <div class="email">
            <label>email</label>
            <div class="input-icon1">
                <input type="email" placeholder="">
                <i class="fa-regular fa-user"></i>
            </div>
        </div>
        <div class="email">
            <label>First name</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <div class="email">
            <label>Last name</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <div class="email">
            <label>Create a password</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <div class="email">
            <label>Repeat password</label>
            <div class="input-icon1">
                <input type="text">
            </div>
        </div>
        <button class="btn-login">REGISTER ME!</button>
    </div>
</main>

</body>
</html>
